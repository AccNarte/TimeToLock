# =============================================================================
# TimeLock — Mise en prod de la base de données (the21method.com)
# =============================================================================
#
# Objectif : Postgres self-hosted sur une instance vierge, données migrées
# depuis Neon, accessible en TLS vérifié (sslmode=verify-full) via
# db.the21method.com, certificat Let's Encrypt obtenu par DNS-01 Cloudflare.
#
# IMPORTANT — Cloudflare ne proxifie PAS le port 5432 (Postgres). Donc :
#   • Le record DNS `db` doit être en "DNS only" (nuage GRIS), pas proxifié.
#   • Le TLS est géré par Postgres lui-même (pas par Cloudflare).
#   • On utilise le challenge DNS-01 (via l'API Cloudflare) pour obtenir le
#     certificat sans ouvrir de port 80.
#
# Légende des valeurs à remplacer :
#   <DB_IP_PUBLIQUE>   IP publique de cette instance DB
#   <BACKEND_IP>       IP de la machine backend (pour restreindre l'accès 5432)
#   <DB_PASSWORD>      mot de passe Postgres généré (openssl rand -base64 24)
#   <CF_API_TOKEN>     token API Cloudflare (créé en section 3)
#
# Suivre dans l'ordre 0 → 9.
#
# =============================================================================


# -----------------------------------------------------------------------------
# 0. PRÉPARATION (sur ton poste local)
# -----------------------------------------------------------------------------

# 0.1 Générer le mot de passe Postgres (note-le dans ton gestionnaire de mdp)
openssl rand -base64 24

# 0.2 Récupérer la version Postgres de Neon (pour installer la même côté serveur).
#     Connecte-toi à Neon et lance, OU depuis ton poste :
psql 'TON_URL_NEON' -c 'SHOW server_version;'
#     Note le numéro majeur (ex : 16). On installera Postgres >= cette version.


# -----------------------------------------------------------------------------
# 1. DNS CLOUDFLARE
# -----------------------------------------------------------------------------
# Dans le dashboard Cloudflare → the21method.com → DNS → Records → Add record :
#
#   Type : A
#   Name : db
#   IPv4 : <DB_IP_PUBLIQUE>
#   Proxy status : DNS only   ← NUAGE GRIS (cliquer pour le désactiver)
#   TTL : Auto
#
# Vérifier la propagation depuis ton poste (doit renvoyer <DB_IP_PUBLIQUE>) :
dig +short db.the21method.com
# Si ça renvoie une IP Cloudflare (104.x / 172.x), c'est que le proxy est
# encore actif → repasse le record en "DNS only".


# =============================================================================
# 2. INSTALLATION POSTGRES (sur l'instance DB)
# =============================================================================

# 2.1 Bases système
sudo apt update && sudo apt upgrade -y
sudo apt install -y curl ca-certificates gnupg ufw

# 2.2 Dépôt officiel PostgreSQL (pour avoir une version récente, ex 16)
sudo install -d /usr/share/postgresql-common/pgdg
sudo curl -o /usr/share/postgresql-common/pgdg/apt.postgresql.org.asc \
  --fail https://www.postgresql.org/media/keys/ACCC4CF8.asc
echo "deb [signed-by=/usr/share/postgresql-common/pgdg/apt.postgresql.org.asc] https://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" \
  | sudo tee /etc/apt/sources.list.d/pgdg.list
sudo apt update
sudo apt install -y postgresql-16 postgresql-client-16

sudo systemctl enable --now postgresql
sudo systemctl status postgresql --no-pager


# =============================================================================
# 3. TOKEN API CLOUDFLARE (pour le challenge DNS-01)
# =============================================================================
# Dashboard Cloudflare → Mon profil → API Tokens → Create Token
#   → Template "Edit zone DNS"
#   → Zone Resources : Include → Specific zone → the21method.com
#   → Create → COPIER le token (affiché une seule fois) = <CF_API_TOKEN>
#
# Sur l'instance DB, stocker le token dans un fichier protégé :
sudo mkdir -p /root/.secrets
sudo tee /root/.secrets/cloudflare.ini >/dev/null <<'EOF'
dns_cloudflare_api_token = <CF_API_TOKEN>
EOF
sudo chmod 600 /root/.secrets/cloudflare.ini


# =============================================================================
# 4. CERTIFICAT LET'S ENCRYPT (challenge DNS-01)
# =============================================================================

# 4.1 Installer certbot + plugin Cloudflare
sudo apt install -y certbot python3-certbot-dns-cloudflare

# 4.2 Obtenir le certificat pour db.the21method.com
#     (DNS-01 : certbot crée un TXT temporaire via l'API Cloudflare, aucun
#     port à ouvrir)
sudo certbot certonly \
  --dns-cloudflare \
  --dns-cloudflare-credentials /root/.secrets/cloudflare.ini \
  --dns-cloudflare-propagation-seconds 30 \
  -d db.the21method.com \
  --non-interactive --agree-tos -m ton-email@example.com

# Les fichiers atterrissent dans :
#   /etc/letsencrypt/live/db.the21method.com/fullchain.pem
#   /etc/letsencrypt/live/db.the21method.com/privkey.pem


# =============================================================================
# 5. BRANCHER LE CERT SUR POSTGRES + AUTO-RENOUVELLEMENT
# =============================================================================
# Postgres tourne en tant qu'utilisateur `postgres` et ne peut pas lire
# /etc/letsencrypt/archive (root 0700). On copie donc le cert dans un dossier
# que postgres peut lire, via un hook de renouvellement.

# 5.1 Script de déploiement du cert (recopié à chaque renouvellement)
sudo tee /etc/letsencrypt/renewal-hooks/deploy/postgres-ssl.sh >/dev/null <<'EOF'
#!/bin/bash
set -e
DOMAIN=db.the21method.com
SSL_DIR=/etc/postgresql/ssl
install -d -o postgres -g postgres -m 700 "$SSL_DIR"
cp "/etc/letsencrypt/live/$DOMAIN/fullchain.pem" "$SSL_DIR/server.crt"
cp "/etc/letsencrypt/live/$DOMAIN/privkey.pem"  "$SSL_DIR/server.key"
chown postgres:postgres "$SSL_DIR/server.crt" "$SSL_DIR/server.key"
chmod 644 "$SSL_DIR/server.crt"
chmod 600 "$SSL_DIR/server.key"
systemctl reload postgresql || true
EOF
sudo chmod +x /etc/letsencrypt/renewal-hooks/deploy/postgres-ssl.sh

# 5.2 Lancer le hook une première fois manuellement (le renouvellement futur
#     l'appellera tout seul)
sudo /etc/letsencrypt/renewal-hooks/deploy/postgres-ssl.sh

# 5.3 Activer le TLS dans postgresql.conf
PG_CONF=/etc/postgresql/16/main/postgresql.conf
sudo sed -i "s|^#\?ssl =.*|ssl = on|" "$PG_CONF"
sudo sed -i "s|^#\?ssl_cert_file =.*|ssl_cert_file = '/etc/postgresql/ssl/server.crt'|" "$PG_CONF"
sudo sed -i "s|^#\?ssl_key_file =.*|ssl_key_file = '/etc/postgresql/ssl/server.key'|" "$PG_CONF"
# Écouter sur toutes les interfaces (l'accès est restreint par firewall + pg_hba)
sudo sed -i "s|^#\?listen_addresses =.*|listen_addresses = '*'|" "$PG_CONF"

# 5.4 Vérifier que le renouvellement marchera (à blanc)
sudo certbot renew --dry-run


# =============================================================================
# 6. UTILISATEUR + BASE + RÈGLES D'ACCÈS
# =============================================================================

# 6.1 Créer l'utilisateur applicatif et la base
sudo -u postgres psql <<'EOF'
CREATE USER timelock_user WITH PASSWORD '<DB_PASSWORD>';
CREATE DATABASE the21method_timelock OWNER timelock_user;
GRANT ALL PRIVILEGES ON DATABASE the21method_timelock TO timelock_user;
\q
EOF

# 6.2 pg_hba.conf : forcer TLS (hostssl) et restreindre à l'IP du backend.
#     hostssl = refuse toute connexion non chiffrée.
echo "hostssl  the21method_timelock  timelock_user  <BACKEND_IP>/32  scram-sha-256" \
  | sudo tee -a /etc/postgresql/16/main/pg_hba.conf
# (Si ton backend a une IP dynamique, mets le sous-réseau, ex 0.0.0.0/0,
#  mais c'est moins sûr → privilégie une IP fixe + firewall.)

# 6.3 Appliquer la config
sudo systemctl restart postgresql
sudo systemctl status postgresql --no-pager

# 6.4 Firewall : SSH + Postgres uniquement depuis le backend
sudo ufw allow OpenSSH
sudo ufw allow from <BACKEND_IP> to any port 5432 proto tcp
sudo ufw --force enable
sudo ufw status


# =============================================================================
# 7. MIGRATION DES DONNÉES DEPUIS NEON
# =============================================================================
# À lancer depuis ton poste local (qui a accès à Neon ET à db.the21method.com),
# ou depuis l'instance DB elle-même.

# 7.1 Dump de Neon en format custom (-Fc, tolérant aux versions)
pg_dump 'TON_URL_NEON?sslmode=require' \
  --no-owner --no-privileges --no-tablespaces \
  -Fc -f the21method.dump

# 7.2 Restore vers le nouveau Postgres (en TLS vérifié)
pg_restore --clean --if-exists --no-owner --no-privileges \
  -d 'postgresql://timelock_user:<DB_PASSWORD>@db.the21method.com:5432/the21method_timelock?sslmode=verify-full' \
  the21method.dump

# 7.3 Vérifier que les tables sont là
psql 'postgresql://timelock_user:<DB_PASSWORD>@db.the21method.com:5432/the21method_timelock?sslmode=verify-full' \
  -c '\dt'
# Tu dois voir : users, user_wallets, crypto_locks, blockchain_file_locks,
# factory_deployments, roles, etc.


# =============================================================================
# 8. BRANCHER LE BACKEND
# =============================================================================
# Dans backend/.env sur la machine backend :
#
#   DATABASE_URL=postgresql://timelock_user:<DB_PASSWORD>@db.the21method.com:5432/the21method_timelock?sslmode=verify-full
#   DATABASE_SSL_REJECT_UNAUTHORIZED=true
#   NODE_ENV=production
#
# `DATABASE_SSL_REJECT_UNAUTHORIZED=true` active la vérification du certificat
# (j'ai adapté app.module.ts pour lire cette variable). Le cert Let's Encrypt
# est signé par une CA présente dans le trust store Node → verify-full marche
# sans fournir de CA manuellement.
#
# Puis relancer le backend :
#   pm2 restart timelock-api
#   pm2 logs timelock-api --lines 50
# Tu dois voir Nest démarrer sans erreur de connexion DB.


# =============================================================================
# 9. VALIDATION
# =============================================================================

# 9.1 Vérifier que Postgres exige bien le TLS (connexion non-SSL doit échouer)
psql 'postgresql://timelock_user:<DB_PASSWORD>@db.the21method.com:5432/the21method_timelock?sslmode=disable' -c 'SELECT 1;'
# → DOIT échouer avec "no pg_hba.conf entry ... no encryption"  (c'est voulu)

# 9.2 Connexion vérifiée (doit réussir)
psql 'postgresql://timelock_user:<DB_PASSWORD>@db.the21method.com:5432/the21method_timelock?sslmode=verify-full' -c 'SELECT 1;'
# → renvoie "1"

# 9.3 Confirmer la version du cert présenté
openssl s_client -starttls postgres -connect db.the21method.com:5432 2>/dev/null \
  | openssl x509 -noout -subject -issuer -dates
# subject doit contenir CN=db.the21method.com, issuer = Let's Encrypt


# =============================================================================
# 10. GOTCHAS
# =============================================================================

# "dig db.the21method.com renvoie une IP Cloudflare"
#   → Le record est proxifié (orange). Repasse-le en DNS only (gris).
#     Postgres ne marche jamais à travers le proxy Cloudflare.

# "certbot DNS-01 échoue / timeout"
#   → Token Cloudflare insuffisant. Il faut Zone:DNS:Edit sur the21method.com.
#     Recrée le token avec le bon scope. Augmente --dns-cloudflare-propagation-seconds.

# "Postgres refuse de démarrer après ssl=on"
#   → permissions de la clé. Doit être postgres:postgres + chmod 600 :
sudo ls -l /etc/postgresql/ssl/
#   → relancer le hook : sudo /etc/letsencrypt/renewal-hooks/deploy/postgres-ssl.sh

# "Backend : self signed certificate in certificate chain"
#   → Tu pointes vers une DB avec cert non vérifiable mais DATABASE_SSL_REJECT_UNAUTHORIZED=true.
#     Soit le cert n'est pas le Let's Encrypt (vérifie 9.3), soit mets la var à false.

# "Backend : no pg_hba.conf entry for host X"
#   → L'IP du backend n'est pas dans pg_hba.conf (section 6.2). Ajoute son IP,
#     puis : sudo systemctl reload postgresql

# "pg_restore: error: could not connect ... server_version mismatch"
#   → Le Postgres local est plus vieux que Neon. Installe une version >= Neon
#     (section 2.2, change postgresql-16 par la bonne version).


# =============================================================================
# 11. CHECKLIST
# =============================================================================
# [ ] DNS : db.the21method.com → <DB_IP> en DNS only (gris)
# [ ] Postgres 16 installé et démarré
# [ ] Cert Let's Encrypt obtenu via DNS-01 Cloudflare
# [ ] Hook postgres-ssl.sh exécuté + ssl=on dans postgresql.conf
# [ ] certbot renew --dry-run OK
# [ ] User timelock_user + base the21method_timelock créés
# [ ] pg_hba : hostssl restreint à l'IP backend
# [ ] UFW : 5432 ouvert uniquement depuis <BACKEND_IP>
# [ ] Données Neon migrées (pg_dump | pg_restore) + tables vérifiées
# [ ] Backend DATABASE_URL + DATABASE_SSL_REJECT_UNAUTHORIZED=true
# [ ] Connexion sslmode=disable REFUSÉE, verify-full ACCEPTÉE
# [ ] Backups quotidiens configurés (voir mybaysy-runbook.conf §1.6)
