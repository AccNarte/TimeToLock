# =============================================================================
# TimeLock — Runbook de déploiement complet pour mybaysy.dev
# =============================================================================
#
# 3 machines Linux (Ubuntu 22.04+ recommandé) :
#   • DB machine     → Postgres (IP privée 10.0.0.42, exemple)
#   • Backend machine → NestJS sur api.mybaysy.dev (IP privée 10.0.0.43)
#   • Front machine  → Next.js sur mybaysy.dev + www.mybaysy.dev
#
# Tout est en HTTPS via Let's Encrypt, process managé par pm2, reverse proxy
# nginx. Cookies cross-domain SameSite=None+Secure pour l'auth.
#
# Suivre EXACTEMENT dans l'ordre des sections (0 → 6).
# Toutes les commandes sont copy-paste prêtes.
#
# =============================================================================


# -----------------------------------------------------------------------------
# 0. PRÉPARATION (sur ton poste local, avant de toucher aux machines)
# -----------------------------------------------------------------------------

# 0.1 Générer les secrets de prod (à coller dans .env plus tard).
#     Lance chaque ligne et note la valeur quelque part de sûr (gestionnaire
#     de mots de passe).
openssl rand -hex 32      # → JWT_SECRET
openssl rand -hex 32      # → WALLET_ENCRYPTION_SECRET
openssl rand -hex 32      # → COOKIE_SECRET (optionnel)
openssl rand -base64 24   # → mot de passe Postgres (sans caractères spéciaux)

# 0.2 Configurer les DNS chez ton registrar (Namecheap, Cloudflare, OVH…)
#     4 records A nécessaires :
#       Type   Nom    Valeur                          TTL
#       A      @      <IP_PUBLIQUE_FRONT_MACHINE>     300
#       A      www    <IP_PUBLIQUE_FRONT_MACHINE>     300
#       A      api    <IP_PUBLIQUE_BACKEND_MACHINE>   300
#
#     Attendre la propagation (test : `dig +short mybaysy.dev` doit retourner l'IP)
#     AVANT de lancer certbot en section 2.7 / 3.7.


# =============================================================================
# 1. MACHINE DB (Postgres)
# =============================================================================
# Adresse IP privée d'exemple : 10.0.0.42
# Adresse IP privée du BACKEND : 10.0.0.43

# 1.1 Mise à jour de base + Postgres
sudo apt update && sudo apt upgrade -y
sudo apt install -y curl ca-certificates git ufw postgresql

# 1.2 Firewall : SSH partout, Postgres seulement depuis le backend
sudo ufw allow OpenSSH
sudo ufw allow from 10.0.0.43 to any port 5432
sudo ufw --force enable
sudo ufw status

# 1.3 Créer l'utilisateur DB et la base
sudo -u postgres psql <<'EOF'
CREATE USER mybaysy_user WITH PASSWORD 'COLLE_LE_DB_PASSWORD_GENERE_EN_0.1';
CREATE DATABASE mybaysy_timelock OWNER mybaysy_user;
GRANT ALL PRIVILEGES ON DATABASE mybaysy_timelock TO mybaysy_user;
\q
EOF

# 1.4 Ouvrir l'écoute Postgres sur l'IP privée
#     (par défaut Postgres n'écoute que localhost)
PG_VERSION=$(ls /etc/postgresql/ | head -1)   # ex: 16
sudo sed -i "s/^#listen_addresses.*/listen_addresses = '10.0.0.42'/" \
  /etc/postgresql/${PG_VERSION}/main/postgresql.conf

# Autoriser l'IP du backend à se connecter avec auth scram-sha-256
echo "host    mybaysy_timelock    mybaysy_user    10.0.0.43/32    scram-sha-256" \
  | sudo tee -a /etc/postgresql/${PG_VERSION}/main/pg_hba.conf

sudo systemctl restart postgresql
sudo systemctl status postgresql --no-pager

# 1.5 Migrer depuis NeonDB (skip si nouvelle install)
#     À lancer depuis ton poste local OU depuis la machine backend.
#     Récupère ton URL NeonDB actuelle dans backend/.env (DATABASE_URL).
pg_dump 'postgresql://...neondb_url...' \
  --no-owner --no-privileges --no-tablespaces \
  -Fc -f mybaysy.dump

pg_restore --clean --if-exists --no-owner --no-privileges \
  -d 'postgresql://mybaysy_user:DB_PASSWORD@10.0.0.42:5432/mybaysy_timelock' \
  mybaysy.dump

# 1.6 Backup quotidien automatique (cron à 3h du matin, garde 14 jours)
sudo mkdir -p /var/backups
echo "0 3 * * * postgres pg_dump mybaysy_timelock -Fc -f /var/backups/mybaysy-\$(date +\%F).dump && find /var/backups -name 'mybaysy-*.dump' -mtime +14 -delete" \
  | sudo tee /etc/cron.d/mybaysy-backup
sudo chmod 644 /etc/cron.d/mybaysy-backup


# =============================================================================
# 2. MACHINE BACKEND (api.mybaysy.dev)
# =============================================================================

# 2.1 Bases système + Node.js 20 LTS + pm2 + nginx + certbot
sudo apt update && sudo apt upgrade -y
sudo apt install -y curl ca-certificates git ufw nginx certbot python3-certbot-nginx
curl -fsSL https://deb.nodesource.com/setup_20.x | sudo -E bash -
sudo apt install -y nodejs
sudo npm install -g pm2

# 2.2 Firewall
sudo ufw allow OpenSSH
sudo ufw allow 'Nginx Full'
sudo ufw --force enable

# 2.3 User dédié non-root + arborescence
sudo useradd -m -s /bin/bash mybaysy
sudo mkdir -p /srv/mybaysy
sudo chown mybaysy:mybaysy /srv/mybaysy

# 2.4 Cloner le repo
sudo -iu mybaysy bash <<'BASH'
cd /srv/mybaysy
git clone https://github.com/AccNarte/TimeToLock.git .
cd backend
BASH

# 2.5 Install + build + .env
sudo -iu mybaysy bash <<'BASH'
cd /srv/mybaysy/backend
npm ci
npm run build
cp .env.production.example .env
BASH

# Éditer .env (en tant que user mybaysy) :
sudo -iu mybaysy nano /srv/mybaysy/backend/.env
# Remplir AU MINIMUM :
#   NODE_ENV=production
#   PORT=3011
#   DATABASE_URL=postgresql://mybaysy_user:DB_PASSWORD@10.0.0.42:5432/mybaysy_timelock?sslmode=disable
#   JWT_SECRET=...                  (la valeur générée en 0.1)
#   WALLET_ENCRYPTION_SECRET=...    (autre valeur générée en 0.1)
#   FRONTEND_URLS=https://mybaysy.dev,https://www.mybaysy.dev
#   PINATA_API_KEY=...
#   PINATA_SECRET_KEY=...
# (Optionnel) COOKIE_DOMAIN=.mybaysy.dev

# 2.6 Démarrer via pm2 puis le faire booter au démarrage
sudo -iu mybaysy bash <<'BASH'
cd /srv/mybaysy/backend
pm2 start ecosystem.config.js --env production
pm2 save
pm2 status
BASH

# pm2 startup demande des droits root → repasser en sudo
sudo env PATH=$PATH:/usr/bin /usr/lib/node_modules/pm2/bin/pm2 startup systemd \
  -u mybaysy --hp /home/mybaysy
# La commande affichée ci-dessus doit être copy-paste : pm2 imprime une ligne
# `sudo env PATH=... pm2 startup systemd -u mybaysy --hp ...` à exécuter

# 2.7 nginx vhost pour api.mybaysy.dev
sudo cp /srv/mybaysy/deploy/nginx/timelock-api.conf \
  /etc/nginx/sites-available/api.mybaysy.dev.conf
sudo ln -s /etc/nginx/sites-available/api.mybaysy.dev.conf \
  /etc/nginx/sites-enabled/api.mybaysy.dev.conf

# Tester la config (sans recharger). Doit afficher 'syntax is ok' et 'test is successful'.
sudo nginx -t

# Note : nginx ne va pas pouvoir démarrer tant que le cert n'existe pas,
# car le conf charge les fichiers /etc/letsencrypt/.../fullchain.pem.
# Solution : commenter temporairement les directives ssl_* + listen 443,
# puis demander le cert, puis re-décommenter. OU bien utiliser le helper
# certbot --nginx qui gère ça tout seul.

# 2.8 Obtenir le certificat HTTPS via Let's Encrypt
#     PRÉREQUIS : DNS api.mybaysy.dev pointe déjà vers cette machine.
sudo certbot --nginx -d api.mybaysy.dev --non-interactive --agree-tos \
  -m ton-email@example.com --redirect

sudo systemctl reload nginx
sudo systemctl status nginx --no-pager

# 2.9 Validation
curl https://api.mybaysy.dev/api/factory/current?chainId=137
# Doit retourner du JSON (potentiellement {"chainId":137,"contractType":"crypto_timelock","address":null})

# Vérifier que pm2 a bien lancé le service
pm2 logs timelock-api --lines 50


# =============================================================================
# 3. MACHINE FRONT (mybaysy.dev + www.mybaysy.dev)
# =============================================================================

# 3.1 Bases (idem backend)
sudo apt update && sudo apt upgrade -y
sudo apt install -y curl ca-certificates git ufw nginx certbot python3-certbot-nginx
curl -fsSL https://deb.nodesource.com/setup_20.x | sudo -E bash -
sudo apt install -y nodejs
sudo npm install -g pm2

# 3.2 Firewall
sudo ufw allow OpenSSH
sudo ufw allow 'Nginx Full'
sudo ufw --force enable

# 3.3 User + repo
sudo useradd -m -s /bin/bash mybaysy
sudo mkdir -p /srv/mybaysy
sudo chown mybaysy:mybaysy /srv/mybaysy

sudo -iu mybaysy bash <<'BASH'
cd /srv/mybaysy
git clone https://github.com/AccNarte/TimeToLock.git .
cd front
npm ci
cp .env.production.example .env.production
BASH

# 3.4 Éditer .env.production (en tant que mybaysy)
sudo -iu mybaysy nano /srv/mybaysy/front/.env.production
# Remplir :
#   NEXT_PUBLIC_API_URL=https://api.mybaysy.dev/api
#   NEXT_PUBLIC_WALLET_CONNECT_PROJECT_ID=...
#   NEXT_PUBLIC_ETHERSCAN_API_KEY=...
#   NEXT_PUBLIC_PINATA_JWT=...
#   NEXT_PUBLIC_PINATA_GATEWAY=https://...

# 3.5 Build (les NEXT_PUBLIC_* sont injectés au build, donc cet ordre est crucial)
sudo -iu mybaysy bash <<'BASH'
cd /srv/mybaysy/front
npm run build

# Copier les assets dans le bundle standalone (Next.js ne le fait pas tout seul)
cp -r public .next/standalone/public
cp -r .next/static .next/standalone/.next/static
BASH

# 3.6 pm2
sudo -iu mybaysy bash <<'BASH'
cd /srv/mybaysy/front
pm2 start ecosystem.config.js --env production
pm2 save
pm2 status
BASH

sudo env PATH=$PATH:/usr/bin /usr/lib/node_modules/pm2/bin/pm2 startup systemd \
  -u mybaysy --hp /home/mybaysy
# Copier-coller la ligne `sudo env PATH=...` qu'affiche pm2 startup

# 3.7 nginx vhost pour mybaysy.dev + www.mybaysy.dev
sudo cp /srv/mybaysy/deploy/nginx/timelock-front.conf \
  /etc/nginx/sites-available/mybaysy.dev.conf
sudo ln -s /etc/nginx/sites-available/mybaysy.dev.conf \
  /etc/nginx/sites-enabled/mybaysy.dev.conf
sudo nginx -t

# 3.8 HTTPS Let's Encrypt
#     PRÉREQUIS : DNS mybaysy.dev + www.mybaysy.dev pointent vers cette machine.
sudo certbot --nginx -d mybaysy.dev -d www.mybaysy.dev --non-interactive \
  --agree-tos -m ton-email@example.com --redirect

sudo systemctl reload nginx
sudo systemctl status nginx --no-pager

# 3.9 Validation
curl -I https://mybaysy.dev/
# Doit afficher : HTTP/2 200, content-type: text/html

pm2 logs timelock-front --lines 50


# =============================================================================
# 4. POST-DÉPLOIEMENT (depuis ton poste local + UI navigateur)
# =============================================================================

# 4.1 Se promouvoir admin (depuis la machine backend, via SSH)
ssh user@<IP_BACKEND>
sudo -iu mybaysy bash <<'BASH'
cd /srv/mybaysy/backend
ADMIN_WALLET=0xTonAdresseEthereum npm run seed:admin
BASH

# 4.2 Déployer les factories on-chain
#     Ouvre https://mybaysy.dev/deploy dans ton navigateur, connecte ton wallet
#     (admin), choisis "TimelockFactory (crypto)", clique "Déployer".
#     L'enregistrement DB est automatique grâce à mon refacto factory_deployments.
#     Recommence pour "FileLockFactory (fichiers)".

# 4.3 Tester l'auth cross-domain
#     Ouvre https://mybaysy.dev en fenêtre privée, connecte-toi.
#     Vérifie dans DevTools → Application → Cookies → api.mybaysy.dev :
#       access_token : SameSite=None, Secure=true, HttpOnly=true
#     Si le cookie n'est pas posé, voir section 6 (gotchas).


# =============================================================================
# 5. MISES À JOUR DE VERSION (à chaque git push)
# =============================================================================

# Backend (sur la machine api)
ssh user@<IP_BACKEND>
sudo -iu mybaysy bash <<'BASH'
cd /srv/mybaysy
git pull
cd backend
npm ci
npm run build
pm2 restart timelock-api
pm2 logs timelock-api --lines 30
BASH

# Front (sur la machine front)
ssh user@<IP_FRONT>
sudo -iu mybaysy bash <<'BASH'
cd /srv/mybaysy
git pull
cd front
npm ci
npm run build
cp -r public .next/standalone/public
cp -r .next/static .next/standalone/.next/static
pm2 restart timelock-front
pm2 logs timelock-front --lines 30
BASH


# =============================================================================
# 6. COMMANDES UTILES / DÉBUG
# =============================================================================

# Logs en temps réel
pm2 logs timelock-api
pm2 logs timelock-front
sudo journalctl -u nginx -f
sudo tail -f /var/log/nginx/access.log
sudo tail -f /var/log/nginx/error.log

# Statut pm2
pm2 status
pm2 monit          # vue interactive

# Reload nginx après une modif de config
sudo nginx -t && sudo systemctl reload nginx

# Restart un service
pm2 restart timelock-api
pm2 restart timelock-front
sudo systemctl restart nginx
sudo systemctl restart postgresql

# Tester la connexion DB depuis le backend
psql 'postgresql://mybaysy_user:PASSWORD@10.0.0.42:5432/mybaysy_timelock' -c '\dt'

# Tester le renouvellement Let's Encrypt (à blanc, sans renouveler)
sudo certbot renew --dry-run
# Le vrai renouvellement est automatique via systemctl timer :
sudo systemctl status certbot.timer

# Voir les routes que Nest a enregistrées
pm2 logs timelock-api --lines 200 | grep "Mapped"


# =============================================================================
# 7. GOTCHAS — solutions aux erreurs fréquentes
# =============================================================================

# Erreur : "Origin https://mybaysy.dev not allowed by CORS"
# Cause   : URL pas dans FRONTEND_URLS du backend
# Fix     : Édite backend/.env, ajoute le scheme exact (https://mybaysy.dev),
#           pas de slash final. Puis :
sudo -iu mybaysy pm2 restart timelock-api

# Erreur : "Cookie n'est pas posé après login"
# Cause   : 99% du temps, NODE_ENV != 'production' donc SameSite=Lax
# Fix     : grep NODE_ENV /srv/mybaysy/backend/.env  → doit être 'production'
sudo -iu mybaysy pm2 restart timelock-api

# Erreur : "Le cookie est posé mais pas envoyé sur les XHR"
# Cause   : 'Secure' refusé sans HTTPS, ou nginx ne fournit pas X-Forwarded-Proto
# Fix     : Vérifier que /api/* est servi en HTTPS (curl -I)
#          Vérifier nginx envoie bien le header : la conf fournie le fait,
#          mais si tu l'as remplacée, ajoute :
#            proxy_set_header X-Forwarded-Proto $scheme;

# Erreur : "502 Bad Gateway" sur mybaysy.dev
# Cause   : pm2 pas démarré OU il écoute sur un autre port que 3010/3011
# Fix     :
sudo -iu mybaysy pm2 status
# → Voir si le service est en "online". Si "errored", logs :
sudo -iu mybaysy pm2 logs timelock-front --err --lines 50

# Erreur : "Cannot connect to Postgres" depuis le backend
# Cause   : pg_hba.conf ne liste pas l'IP, ou le firewall bloque, ou Postgres
#           n'écoute pas sur l'IP privée
# Fix     : Sur la machine DB :
sudo grep listen_addresses /etc/postgresql/*/main/postgresql.conf
sudo grep mybaysy /etc/postgresql/*/main/pg_hba.conf
sudo ufw status | grep 5432
# Tester depuis le backend :
nc -zv 10.0.0.42 5432

# Erreur : "synchronize a écrasé / dropé mes tables"
# Cause   : NODE_ENV n'était pas 'production' au boot → TypeORM a synchronisé
# Fix     : RESTORE le dernier backup, mets NODE_ENV=production, relance :
#          pg_restore -d '...' /var/backups/mybaysy-YYYY-MM-DD.dump

# Erreur : "Le factory est non configuré sur /crypto"
# Cause   : Aucun deploy enregistré en DB pour ce chainId/contractType
# Fix     : Va sur /deploy en étant admin, déploie les deux factories
#          (crypto + file). L'enregistrement DB est auto.


# =============================================================================
# 8. CHECKLIST FINALE DE PRODUCTION
# =============================================================================
#
# [ ] DNS : 3 records A (mybaysy.dev, www.mybaysy.dev, api.mybaysy.dev)
# [ ] Postgres : écoute IP privée, pg_hba restreint au backend, backup quotidien
# [ ] Backend : .env complet, NODE_ENV=production, pm2 + startup systemd
# [ ] Backend : nginx + HTTPS + redirect 80→443 actifs
# [ ] Front : build avec les bons NEXT_PUBLIC_*, pm2 + startup systemd
# [ ] Front : nginx + HTTPS + redirect 80→443 actifs
# [ ] HTTPS auto-renew : `systemctl status certbot.timer` → active
# [ ] UFW actif sur les 3 machines
# [ ] SSH : désactiver root login + auth par clé uniquement
# [ ] Admin promu via seed:admin
# [ ] Factories déployées via /deploy
# [ ] Pinata JWT régénéré (l'ancien partagé doit être révoqué)
# [ ] Test du flow complet en fenêtre privée : signup wallet → /crypto → lock MATIC
