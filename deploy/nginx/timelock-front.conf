# /etc/nginx/sites-available/timelock-front.conf
#
# Front machine — serves the Next.js standalone server (port 3010) behind
# nginx on mybaysy.dev + www.mybaysy.dev, with HTTPS via Let's Encrypt.
#
# Symlink to enable:   ln -s /etc/nginx/sites-available/timelock-front.conf /etc/nginx/sites-enabled/
# Test config:         nginx -t
# Reload:              systemctl reload nginx

# ── HTTP → HTTPS redirect ─────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name mybaysy.dev www.mybaysy.dev;

    # Let certbot answer the ACME challenge over HTTP-01.
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS ─────────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name mybaysy.dev www.mybaysy.dev;

    # Filled in by `certbot --nginx` (or generate manually).
    ssl_certificate     /etc/letsencrypt/live/mybaysy.dev/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mybaysy.dev/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    # Security headers (light — adjust CSP if you embed third-party widgets).
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Body size — file locks upload encrypted files via Pinata, so allow some headroom.
    client_max_body_size 50M;

    # Cache hashed Next.js static assets aggressively.
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3010;
        proxy_cache_valid 200 365d;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location / {
        proxy_pass http://127.0.0.1:3010;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        proxy_read_timeout 60s;
    }
}
