# /etc/nginx/sites-available/timelock-api.conf
#
# Backend machine — exposes the NestJS API (port 3011) on api.mybaysy.dev
# with HTTPS. Cross-domain cookies require a valid TLS cert.

# ── HTTP → HTTPS redirect (also serves ACME challenge) ────────────────
server {
    listen 80;
    listen [::]:80;
    server_name api.mybaysy.dev;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS ─────────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.mybaysy.dev;

    ssl_certificate     /etc/letsencrypt/live/api.mybaysy.dev/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.mybaysy.dev/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Pinata uploads happen client-side via the Pinata API directly, but the
    # backend also receives multipart for legacy file flows. Keep some margin.
    client_max_body_size 50M;

    location / {
        proxy_pass http://127.0.0.1:3011;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_read_timeout 60s;

        # Forward cookies (Set-Cookie + Cookie) untouched — Nest sets the
        # JWT cookie with Domain=.mybaysy.dev (optional) and SameSite=None.
    }
}
